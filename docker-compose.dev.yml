name: itinera_v2_dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: itinera
      POSTGRES_USER: itinera
      POSTGRES_PASSWORD: itinera
    ports:
      - "55432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itinera -d itinera"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
